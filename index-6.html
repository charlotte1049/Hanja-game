function profilesScreen(){return `<main class="screen"><div class="home-clouds" aria-hidden="true"><span class="cloud c1"></span><span class="cloud c2"></span><span class="cloud c3"></span></div><section class="panel"><div class="brand">Charlotte’s Learning Lab</div><div class="tagline">Learn • Play • Grow</div><h1 class="title">Choose Your Learner</h1><p class="greeting">오늘 한자 공부를 시작할 친구를 골라요.</p><div class="profile-grid">${state.learners.map(l=>`<button class="profile-card" data-pick="${l.id}"><span class="icon">${l.icon}</span>${esc(l.name)}</button>`).join("")}<button class="profile-card add-profile" data-add><span class="icon">➕</span>Add New Learner</button></div>${footer()}</section></main>`}

function countChoiceSection(active){return `<div class="section"><h3>문제 수</h3><div class="device-group"><div class="device-label">📱 모바일 최적화</div><div class="choices">${[[6,"6쌍 (12장)"],[8,"8쌍 (16장)"],[10,"10쌍 (20장)"]].map(([v,label])=>`<button class="choice ${v===Number(active)?"active":""}" data-choice="count" data-value="${v}">${label}</button>`).join("")}</div><div class="recommend-note">휴대폰 기본 추천: 6쌍</div></div><div class="device-group"><div class="device-label">💻 PC 최적화</div><div class="choices">${[[10,"10쌍 (20장)"],[15,"15쌍 (30장)"],[20,"20쌍 (40장)"]].map(([v,label])=>`<button class="choice ${v===Number(active)?"active":""}" data-choice="count" data-value="${v}">${label}</button>`).join("")}</div><div class="recommend-note">PC 기본 추천: 15쌍 · 최대 선택: 20쌍</div></div></div>`}
function choiceSection(title,key,items,active,stars=false){return `<div class="section"><h3>${title}</h3><div class="choices">${items.map(it=>{const val=Array.isArray(it)?it[0]:it,label=Array.isArray(it)?it[1]:(stars?it+"쌍":it);return `<button class="choice ${String(val)===String(active)?"active":""} ${stars&&(it===20||it===30)?"star":""}" data-choice="${key}" data-value="${String(val)}">${label}</button>`}).join("")}</div></div>`}
function eligibleItems(pref){const gradeIndex=GRADES.indexOf(pref.grade);let arr=HANJA_DATA.filter(x=>pref.scope==="cumulative"?GRADES.indexOf(x.grade)<=gradeIndex:x.grade===pref.grade);const stats=ld().hanjaStats;
if(pref.scope==="new")arr=arr.filter(x=>!stats[x.hanja]||!stats[x.hanja].shown);
if(pref.scope==="wrong")arr=arr.filter(x=>(stats[x.hanja]?.wrong||0)>0);
if(pref.scope==="weak")arr=arr.filter(x=>{const s=stats[x.hanja];return s&&(s.wrong>0||s.mastery==="조금 헷갈림")});
if(pref.scope==="mastered")arr=arr.filter(x=>stats[x.hanja]?.mastery==="완전히 익힘");
return arr}
function scoreItem(x){const s=ld().hanjaStats[x.hanja]||{};let score=Math.random();if(s.lastResult==="wrong")score+=100;if((s.wrong||0)>1)score+=40+s.wrong*4;if(!s.shown)score+=30;if(s.lastSeen)score+=Math.min(25,(Date.now()-s.lastSeen)/86400000);if(s.lastResult==="correct")score-=10;if(s.mastery==="완전히 익힘")score-=35;return score}
function selectItems(pref){let pool=eligibleItems(pref);if(!pool.length&&pref.scope!=="grade"){alert("선택한 범위에 해당하는 한자가 없어 이번 급수 전체로 출제할게요.");pool=HANJA_DATA.filter(x=>x.grade===pref.grade)}
pool=[...pool].sort((a,b)=>scoreItem(b)-scoreItem(a));const priorWrong=pool.filter(x=>ld().hanjaStats[x.hanja]?.lastResult==="wrong").slice(0,Math.floor(pref.count*.4));const chosen=[...priorWrong];for(const x of pool)if(!chosen.some(y=>y.hanja===x.hanja)&&chosen.length<pref.count)chosen.push(x);return chosen}
function startGame(overrides={}){const p={...ld().preferences,...overrides};ld().preferences=p;const items=selectItems(p);if(!items.length){alert("출제할 한자가 없어요.");return}if(items.length<p.count)alert(`사용 가능한 한자가 ${items.length}개라 ${items.length}쌍으로 시작해요.`);
const cards=[];for(const x of items){cards.push({id:uid("c"),pair:x.hanja,type:"hanja",item:x,matched:false});cards.push({id:uid("c"),pair:x.hanja,type:"meaning",item:x,matched:false})}shuffle(cards);
game={id:uid("game"),learnerId:currentLearnerId,pref:p,items,cards,selected:null,locked:false,startedAt:Date.now(),elapsedBefore:0,wrong:0,hints:0,matches:0,streak:0,bestStreak:0,wrongHanja:{},completed:false,processed:{}};state.activeGame=game;ld().overallStats.plays++;saveState();show("game")}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function gameScreen(){if(!game)return "";const l=learner(),remain=game.items.length-game.matches;return `<main class="screen game-screen"><div class="game-wrap"><div class="topbar"><button class="smallbtn learner-btn" data-exit>${l.icon} <span class="learner-name">${esc(l.name)}'s Hanja</span></button><div class="statsline"><span class="stat-chip stat-grade"><span class="stat-label">급수</span><b>${game.pref.grade}</b></span><span class="stat-chip stat-mode"><span class="stat-label">모드</span><b>${game.pref.mode==="practice"?"연습":"도전"}</b></span><span class="stat-chip stat-remain"><span class="stat-label">남은 짝</span><b id="remain">${remain}</b></span><span class="stat-chip stat-time"><span class="stat-label">시간</span><b id="timer">${fmt(elapsed())}</b></span><span class="stat-chip stat-wrong"><span class="stat-label">오답</span><b id="wrong">${game.wrong}</b></span><span class="stat-chip stat-hints"><span class="stat-label">힌트</span><b id="hints">${game.hints}</b></span></div><button class="smallbtn hintbtn" data-hint><span class="hint-full">🪄 힌트</span><span class="hint-short">🪄</span></button></div><div class="board pairs-${game.items.length}" id="board">${game.cards.map(cardHtml).join("")}</div>${footer()}</div></main>`}
function cardHtml(c){const pic=game.pref.pictures&&c.item.imageAvailable?`<div class="pic" aria-hidden="true">${c.item.imageKey}</div>`:"";return `<button class="card ${c.type} ${c.matched?"matched":""} ${c.type==="meaning"&&!pic?"no-picture":""}" data-card="${c.id}" aria-label="${c.type==="hanja"?"한자 "+c.item.hanja:c.item.fullMeaning}">${c.type==="hanja"?c.item.hanja:`${pic}<div class="meaning-line"><span>${esc(c.item.meaning)}</span><span class="sound">${esc(c.item.sound)}</span></div>`}</button>`}
function bindGame(){timerHandle=setInterval(()=>{const e=document.getElementById("timer");if(e)e.textContent=fmt(elapsed())},500)}
function elapsed(){return game?game.elapsedBefore+Math.floor((Date.now()-game.startedAt)/1000):0}
function fmt(sec){return String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0")}
function clickCard(id){if(game.locked||game.completed)return;const c=game.cards.find(x=>x.id===id);if(!c||c.matched)return;const el=document.querySelector(`[data-card="${id}"]`);if(c.type==="meaning"){const p=el.querySelector(".pic");if(p){p.classList.add("pop");setTimeout(()=>p.classList.remove("pop"),300)}}if(!game.selected){game.selected=id;el.classList.add("selected");return}
const first=game.cards.find(x=>x.id===game.selected);if(first.id===c.id)return;if(first.type===c.type){document.querySelector(`[data-card="${first.id}"]`).classList.remove("selected");game.selected=id;el.classList.add("selected");return}
game.locked=true;el.classList.add("selected");const a=document.querySelector(`[data-card="${first.id}"]`);
if(first.pair===c.pair){setTimeout(()=>{first.matched=c.matched=true;a.classList.add("matched");el.classList.add("matched");a.classList.remove("selected");el.classList.remove("selected");game.matches++;game.streak++;game.bestStreak=Math.max(game.bestStreak,game.streak);updateHanja(first.item,true);game.selected=null;game.locked=false;saveActive();updateHud();if(game.matches===game.items.length)finishGame()},300)}else{game.wrong++;game.streak=0;game.wrongHanja[first.pair]=(game.wrongHanja[first.pair]||0)+1;game.wrongHanja[c.pair]=(game.wrongHanja[c.pair]||0)+1;updateHanja(first.item,false);updateHanja(c.item,false);a.classList.add("wrong");el.classList.add("wrong");setTimeout(()=>{a.classList.remove("selected","wrong");el.classList.remove("selected","wrong");game.selected=null;game.locked=false;saveActive();updateHud()},800)}}
function updateHud(){const r=document.getElementById("remain"),w=document.getElementById("wrong");if(r)r.textContent=game.items.length-game.matches;if(w)w.textContent=game.wrong}
function statFor(item){const hs=ld().hanjaStats;return hs[item.hanja]||(hs[item.hanja]={grade:item.grade,shown:0,correct:0,wrong:0,streakCorrect:0,streakWrong:0,bestStreak:0,lastSeen:null,lastWrong:null,lastResult:null,withPictureCorrect:0,withoutPictureCorrect:0,hints:0,mastery:"처음 만남"})}
function mastery(s){const acc=s.shown?s.correct/s.shown:0;if(s.withoutPictureCorrect>=3&&s.streakCorrect>=3&&acc>=.9)return"완전히 익힘";if(s.streakCorrect>=3&&s.lastResult==="correct")return"잘 알고 있음";if(s.wrong>0&&(acc<.7||s.lastResult==="wrong"))return"조금 헷갈림";return s.shown?"배우는 중":"처음 만남"}
function updateHanja(item,correct){const key=item.hanja+"_"+(correct?"c":"w")+"_"+game.matches+"_"+game.wrong;if(game.processed[key])return;game.processed[key]=1;const s=statFor(item);s.shown++;s.lastSeen=Date.now();if(correct){s.correct++;s.streakCorrect++;s.streakWrong=0;s.bestStreak=Math.max(s.bestStreak,s.streakCorrect);s.lastResult="correct";if(game.pref.pictures)s.withPictureCorrect++;else s.withoutPictureCorrect++}else{s.wrong++;s.streakWrong++;s.streakCorrect=0;s.lastWrong=Date.now();s.lastResult="wrong"}s.mastery=mastery(s)}
function saveActive(){state.activeGame=game;saveState()}
function finishGame(){game.completed=true;clearInterval(timerHandle);const seconds=elapsed(),d=ld(),o=d.overallStats;o.completed++;o.totalTime+=seconds;o.totalShown+=game.items.length;o.correct+=game.items.length;o.wrong+=game.wrong;o.bestStreak=Math.max(o.bestStreak,game.bestStreak);o.lastStudy=Date.now();const accuracy=Math.round(game.items.length/(game.items.length+game.wrong)*100);d.gameHistory.unshift({gameId:game.id,date:Date.now(),grade:game.pref.grade,scope:game.pref.scope,count:game.items.length,mode:game.pref.mode,pictures:game.pref.pictures,hanja:game.items.map(x=>x.hanja),wrongHanja:Object.keys(game.wrongHanja),wrong:game.wrong,hints:game.hints,time:seconds,accuracy,completed:true});d.gameHistory=d.gameHistory.slice(0,200);state.activeGame=null;saveState();showResult(accuracy,seconds)}
function showResult(acc,seconds){const l=learner();let msg=acc>=95?`${l.name}, 정말 대단해요! 샬롯 선생님도 깜짝 놀랐어요!`:acc>=80?`${l.name}, 정말 잘했어요! 오늘도 한자 실력이 쑥쑥 자랐어요.`:acc>=60?`${l.name}, 끝까지 잘했어요! 헷갈린 한자는 한 번 더 만나 봐요.`:`${l.name}, 오늘 새롭게 배운 한자가 많았어요. 샬롯 선생님과 천천히 다시 해 봐요!`;modal(`<div class="confetti" aria-hidden="true"><i>🎊</i><i>⭐</i><i>🎉</i><i>✨</i><i>🎊</i><i>⭐</i><i>🎉</i><i>✨</i></div><h2 class="celebration-title">🎉 Excellent!</h2><p>${esc(msg)}</p><table class="table"><tr><th>문제</th><td>${game.items.length}쌍</td></tr><tr><th>시간</th><td>${fmt(seconds)}</td></tr><tr><th>정확도</th><td>${acc}%</td></tr><tr><th>오답</th><td>${game.wrong}회</td></tr><tr><th>힌트</th><td>${game.hints}회</td></tr><tr><th>틀린 한자</th><td>${Object.keys(game.wrongHanja).join(", ")||"없음"}</td></tr></table><div class="actions"><button class="action primary" data-again>같은 설정으로 다시 하기</button><button class="action secondary" data-review>틀린 한자만 복습하기</button><button class="action secondary" data-home>다른 설정으로 시작하기</button><button class="action secondary" data-result-records>나의 기록 보기</button></div>`)}
function hint(){if(!game||game.completed)return;game.hints++;const s=game.selected&&game.cards.find(x=>x.id===game.selected);let target;if(s)target=game.cards.find(x=>x.pair===s.pair&&x.id!==s.id);else target=game.cards.find(x=>!x.matched);if(target){const el=document.querySelector(`[data-card="${target.id}"]`);el.style.boxShadow="0 0 0 5px #ffd34d";setTimeout(()=>el.style.boxShadow="",1100)}document.getElementById("hints").textContent=game.hints;saveActive()}
function recordsScreen(){const l=learner(),d=ld(),o=d.overallStats,acc=o.correct+o.wrong?Math.round(o.correct/(o.correct+o.wrong)*100):0;const recentWrong=Object.entries(d.hanjaStats).filter(([,s])=>s.wrong).sort((a,b)=>(b[1].lastWrong||0)-(a[1].lastWrong||0)).slice(0,10).map(x=>x[0]).join(", ")||"없음";return `<main class="screen"><section class="panel"><h1>${l.icon} ${esc(l.name)}의 학습 기록</h1><div class="profile-grid"><div class="record-card"><b>누적 학습 시간</b><br>${fmt(o.totalTime)}</div><div class="record-card"><b>완료 게임</b><br>${o.completed}회</div><div class="record-card"><b>전체 정확도</b><br>${acc}%</div><div class="record-card"><b>최고 연속 정답</b><br>${o.bestStreak}</div></div><h2>급수별 진행도</h2>${GRADES.map(g=>gradeProgress(g)).join("")}<h2>최근 틀린 한자</h2><div class="record-card">${recentWrong}</div><h2>최근 게임</h2>${d.gameHistory.slice(0,8).map(h=>`<div class="record-card">${new Date(h.date).toLocaleDateString()} · ${h.grade} · ${h.count}쌍 · 정확도 ${h.accuracy}% · ${fmt(h.time)}</div>`).join("")||'<p class="muted">아직 기록이 없어요.</p>'}<div class="actions"><button class="action secondary" data-home>돌아가기</button></div>${footer()}</section></main>`}
function gradeProgress(g){const arr=HANJA_DATA.filter(x=>x.grade===g),s=ld().hanjaStats,learned=arr.filter(x=>s[x.hanja]?.shown).length,pct=Math.round(learned/arr.length*100);return `<div class="record-card"><b>${g}</b> ${learned}/${arr.length} (${pct}%)<div class="progress"><span style="width:${pct}%"></span></div></div>`}
function manageScreen(){return `<main class="screen"><section class="panel"><h1>학습자 관리</h1>${state.learners.map((l,i)=>`<div class="manage-row"><span>${l.icon} <b>${esc(l.name)}</b></span><span><button class="smallbtn" data-edit="${l.id}">수정</button><button class="smallbtn" data-reset="${l.id}">기록 초기화</button><button class="smallbtn" data-delete="${l.id}">삭제</button></span></div>`).join("")}<div class="actions"><button class="action primary" data-add>새 학습자 추가</button><button class="action secondary" data-home>돌아가기</button></div>${footer()}</section></main>`}
function allScreen(){return `<main class="screen"><section class="panel"><h1>전체 학습자 현황</h1>${state.learners.map(l=>{const d=state.learnerData[l.id],o=d.overallStats,acc=o.correct+o.wrong?Math.round(o.correct/(o.correct+o.wrong)*100):0;const wrong=Object.entries(d.hanjaStats).filter(([,s])=>s.wrong).sort((a,b)=>(b[1].lastWrong||0)-(a[1].lastWrong||0)).slice(0,5).map(x=>x[0]).join(", ")||"없음";return `<div class="record-card"><h2>${l.icon} ${esc(l.name)}</h2><p>최근 학습: ${o.lastStudy?new Date(o.lastStudy).toLocaleDateString():"없음"} · 누적 시간: ${fmt(o.totalTime)} · 정확도: ${acc}%</p><p>최근 오답: ${wrong}</p></div>`}).join("")}<div class="actions"><button class="action secondary" data-home>돌아가기</button></div>${footer()}</section></main>`}
function settingsScreen(){return `<main class="screen"><section class="panel"><h1>설정 및 데이터</h1><label class="record-card"><input type="checkbox" id="askLaunch" ${state.settings.askLearnerOnLaunch?"checked":""}> 실행할 때마다 학습자 선택하기</label><label class="record-card"><input type="checkbox" id="soundEnabled" ${state.settings.soundEnabled?"checked":""}> 소리 사용</label><div class="notice">학습 기록은 현재 기기의 브라우저에 저장됩니다. 다른 기기에서 사용하거나 브라우저 데이터를 삭제하기 전에는 백업 파일을 저장해 주세요.<br><span class="muted">시크릿 모드에서는 기록이 유지되지 않을 수 있습니다.</span></div><div class="actions"><button class="action primary" data-backup-all>전체 백업</button><button class="action secondary" data-backup-one>현재 학습자 백업</button><label class="action secondary">복원 파일 선택<input id="restoreFile" type="file" accept=".json,application/json" hidden></label><button class="action secondary" data-audit>데이터 검수</button><button class="action secondary" data-home>돌아가기</button></div>${footer()}</section></main>`}
function modal(inner){const d=document.createElement("div");d.className="modal-back";d.innerHTML=`<div class="modal" role="dialog" aria-modal="true">${inner}</div>`;document.body.appendChild(d);d.addEventListener("click",e=>{if(e.target===d)d.remove()})}
function addLearner(existing=null){const l=existing||{id:uid("learner"),name:"",icon:"⭐",profileColor:"pink",createdAt:Date.now()};modal(`<h2>${existing?"학습자 수정":"새 학습자 추가"}</h2><div class="form-row"><input id="lname" maxlength="12" placeholder="이름 또는 별명" value="${esc(l.name)}"></div><div class="choices">${ICONS.map(i=>`<button class="choice ${i===l.icon?"active":""}" data-icon="${i}">${i}</button>`).join("")}</div><div class="actions"><button class="action primary" id="saveLearner">저장</button><button class="action secondary" data-close>취소</button></div>`);let chosen=l.icon;document.querySelectorAll("[data-icon]").forEach(b=>b.onclick=()=>{chosen=b.dataset.icon;document.querySelectorAll("[data-icon]").forEach(x=>x.classList.toggle("active",x===b))});document.getElementById("saveLearner").onclick=()=>{const name=document.getElementById("lname").value.trim();if(!name||name.length>12)return alert("이름을 1~12자로 입력해 주세요.");if(state.learners.some(x=>x.name===name&&x.id!==l.id))return alert("같은 이름이 이미 있어요.");if(existing){existing.name=name;existing.icon=chosen}else{l.name=name;l.icon=chosen;state.learners.push(l);state.learnerData[l.id]=blankLearnerData()}saveState();document.querySelector(".modal-back").remove();render()};document.querySelector("[data-close]").onclick=()=>document.querySelector(".modal-back").remove()}
function backup(kind){let payload;if(kind==="one"){const l=learner();payload={app:"CharlotteHanjaMatchingGame",version:1,exportedAt:Date.now(),learners:[l],learnerData:{[l.id]:ld()},settings:state.settings}}else payload={app:"CharlotteHanjaMatchingGame",...state,exportedAt:Date.now()};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);const date=new Date().toISOString().slice(0,10);a.download=kind==="one"?`${learner().name}_한자학습기록_${date}.json`:`한자게임_전체학습기록_${date}.json`;a.click();URL.revokeObjectURL(a.href)}
async function restore(file){try{const obj=JSON.parse(await file.text());if(obj.app!=="CharlotteHanjaMatchingGame")throw new Error("이 게임의 백업 파일이 아니에요.");if(!Array.isArray(obj.learners)||!obj.learnerData)throw new Error("학습자 데이터가 올바르지 않아요.");if(confirm("확인을 누르면 기존 데이터와 병합합니다. 취소를 누르면 아무 작업도 하지 않습니다.")){for(const l of obj.learners){const idx=state.learners.findIndex(x=>x.id===l.id);if(idx>=0)state.learners[idx]=l;else state.learners.push(l);state.learnerData[l.id]=obj.learnerData[l.id]||blankLearnerData()}saveState();alert("복원이 완료됐어요.");render()}}catch(e){alert("복원하지 못했어요: "+e.message)}}
function audit(){const counts=Object.fromEntries(GRADES.map(g=>[g,HANJA_DATA.filter(x=>x.grade===g).length]));const dup=HANJA_DATA.map(x=>x.hanja).filter((x,i,a)=>a.indexOf(x)!==i);const missing=HANJA_DATA.filter(x=>!x.meaning||!x.sound);const pics=HANJA_DATA.filter(x=>x.imageAvailable).length;modal(`<h2>데이터 검수</h2><div class="audit">총 한자: ${HANJA_DATA.length}\n급수별: ${JSON.stringify(counts)}\n중복 한자: ${dup.join(", ")||"없음"}\n뜻/음 누락: ${missing.length}\n그림 적용: ${pics}\n그림 없음: ${HANJA_DATA.length-pics}\n학습자 수: ${state.learners.length}</div><div class="actions"><button class="action secondary" data-close>닫기</button></div>`);document.querySelector("[data-close]").onclick=()=>document.querySelector(".modal-back").remove()}
function bindCommon(){document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{currentLearnerId=b.dataset.pick;state.settings.lastLearnerId=currentLearnerId;saveState();show("home")});document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>addLearner());document.querySelectorAll("[data-change]").forEach(b=>b.onclick=()=>show("profiles"));document.querySelectorAll("[data-choice]").forEach(b=>b.onclick=()=>{let v=b.dataset.value;if(v==="true")v=true;else if(v==="false")v=false;else if(!isNaN(v)&&b.dataset.choice==="count")v=Number(v);ld().preferences[b.dataset.choice]=v;if(b.dataset.choice==="mode"){ld().preferences.pictures=v==="practice"}saveState();render()});document.querySelectorAll("[data-start]").forEach(b=>b.onclick=()=>startGame());document.querySelectorAll("[data-records]").forEach(b=>b.onclick=()=>show("records"));document.querySelectorAll("[data-wrong]").forEach(b=>b.onclick=()=>startGame({scope:"wrong"}));document.querySelectorAll("[data-manage]").forEach(b=>b.onclick=()=>show("manage"));document.querySelectorAll("[data-all]").forEach(b=>b.onclick=()=>show("all"));document.querySelectorAll("[data-settings]").forEach(b=>b.onclick=()=>show("settings"));document.querySelectorAll("[data-home]").forEach(b=>b.onclick=()=>show("home"));document.querySelectorAll("[data-card]").forEach(b=>b.onclick=()=>clickCard(b.dataset.card));document.querySelectorAll("[data-hint]").forEach(b=>b.onclick=hint);document.querySelectorAll("[data-exit]").forEach(b=>b.onclick=()=>{if(confirm("현재 게임을 저장하고 시작 화면으로 갈까요?")){saveActive();show("home")}});document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>addLearner(state.learners.find(x=>x.id===b.dataset.edit)));document.querySelectorAll("[data-reset]").forEach(b=>b.onclick=()=>{const l=state.learners.find(x=>x.id===b.dataset.reset);if(confirm(`${l.name}의 모든 학습 기록을 초기화할까요? 이 작업은 되돌릴 수 없습니다.`)&&confirm("정말 초기화할까요?")){state.learnerData[l.id]=blankLearnerData();saveState();render()}});document.querySelectorAll("[data-delete]").forEach(b=>b.onclick=()=>{const l=state.learners.find(x=>x.id===b.dataset.delete);if(state.learners.length===1)return alert("학습자는 최소 한 명이 필요해요.");if(confirm(`${l.name} 학습자와 모든 기록을 삭제할까요?`)&&confirm("정말 삭제할까요? 이 작업은 되돌릴 수 없습니다.")){state.learners=state.learners.filter(x=>x.id!==l.id);delete state.learnerData[l.id];if(currentLearnerId===l.id)currentLearnerId=state.learners[0].id;saveState();render()}});document.querySelectorAll("[data-backup-all]").forEach(b=>b.onclick=()=>backup("all"));document.querySelectorAll("[data-backup-one]").forEach(b=>b.onclick=()=>backup("one"));const rf=document.getElementById("restoreFile");if(rf)rf.onchange=e=>e.target.files[0]&&restore(e.target.files[0]);const al=document.getElementById("askLaunch");if(al)al.onchange=()=>{state.settings.askLearnerOnLaunch=al.checked;saveState()};const se=document.getElementById("soundEnabled");if(se)se.onchange=()=>{state.settings.soundEnabled=se.checked;saveState()};document.querySelectorAll("[data-audit]").forEach(b=>b.onclick=audit);document.querySelectorAll("[data-again]").forEach(b=>b.onclick=()=>{document.querySelector(".modal-back").remove();startGame(game.pref)});document.querySelectorAll("[data-review]").forEach(b=>b.onclick=()=>{document.querySelector(".modal-back").remove();startGame({...game.pref,scope:"wrong"})});document.querySelectorAll("[data-result-records]").forEach(b=>b.onclick=()=>{document.querySelector(".modal-back").remove();show("records")})}
window.addEventListener("beforeunload",()=>{if(game&&!game.completed)saveActive()});
(function boot(){if(state.activeGame&&!state.activeGame.completed){currentLearnerId=state.activeGame.learnerId;game=state.activeGame;if(confirm("하던 게임이 있어요. 이어서 할까요?")){game.elapsedBefore=(game.elapsedBefore||0)+Math.floor((Date.now()-game.startedAt)/1000);game.startedAt=Date.now();show("game");return}else state.activeGame=null}if(!state.settings.askLearnerOnLaunch&&state.settings.lastLearnerId&&state.learners.some(x=>x.id===state.settings.lastLearnerId)){currentLearnerId=state.settings.lastLearnerId;show("home")}else show("profiles")})();
</script>
</body>
</html>
